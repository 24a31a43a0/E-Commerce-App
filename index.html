<!DOCTYPE html>
<html lang="te">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Luxe Shop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<!-- NAV -->
<nav>
  <a href="index.html" class="nav-logo">Luxe<span>Shop</span></a>
  <div class="nav-links">
    <a href="products.html">Products</a>
    <a href="cart.html" class="cart-icon">
      🛒 Cart
      <span class="cart-badge" id="navBadge">0</span>
    </a>
  </div>
</nav>

<!-- LOGIN -->
<div class="login-page page">
  <div class="login-split">
    <!-- Left Visual -->
    <div class="login-visual">
      <div>
        <div class="login-visual-title">Premium<br>Shopping<br>Experience.</div>
        <div class="login-visual-sub">Est. 2024 · Hyderabad</div>
      </div>
      <ul class="login-features">
        <li>Curated premium products</li>
        <li>Exclusive member discounts</li>
        <li>Free shipping on orders ₹999+</li>
        <li>24/7 concierge support</li>
      </ul>
      <div class="login-visual-deco">L</div>
    </div>

    <!-- Right Form -->
    <div class="login-form-side">
      <h2>Welcome Back</h2>
      <p>Sign in to your account to continue</p>

      <div class="field">
        <label>Username</label>
        <input type="text" placeholder="Enter your username" id="usernameInput">
      </div>

      <div class="field">
        <label>Password</label>
        <input type="password" placeholder="••••••••" id="passwordInput">
      </div>

      <button class="btn btn-primary" onclick="handleLogin()" id="loginBtn">
        Sign In &nbsp;→
      </button>

      <div class="divider">or</div>

      <button class="btn btn-ghost" onclick="guestLogin()">
        Continue as Guest
      </button>

      <p style="text-align:center;font-size:0.75rem;color:var(--muted);margin-top:20px;">
        Demo: any username & password works
      </p>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script>
  // Update cart badge
  const cart = JSON.parse(localStorage.getItem("cart")) || [];
  document.getElementById("navBadge").textContent = cart.length;

  function handleLogin() {
    const btn = document.getElementById("loginBtn");
    const u = document.getElementById("usernameInput").value;
    const p = document.getElementById("passwordInput").value;
    if (!u || !p) {
      document.getElementById("usernameInput").style.borderColor = "var(--danger)";
      document.getElementById("passwordInput").style.borderColor = "var(--danger)";
      setTimeout(() => {
        document.getElementById("usernameInput").style.borderColor = "";
        document.getElementById("passwordInput").style.borderColor = "";
      }, 1500);
      return;
    }
    btn.textContent = "Signing in...";
    btn.style.opacity = "0.7";
    setTimeout(() => { window.location.href = "products.html"; }, 800);
  }

  function guestLogin() {
    window.location.href = "products.html";
  }

  document.getElementById("passwordInput").addEventListener("keydown", e => {
    if (e.key === "Enter") handleLogin();
  });
</script>
</body>
</html>
